name: Bulletin quotidien YAASAP Notes

on:
  schedule:
    # 07h00 heure de Paris (CEST = UTC+2 en été, CET = UTC+1 en hiver)
    # En été (CEST) : 05h00 UTC = 07h00 Paris
    - cron: '0 5 * * 1-5'   # Lundi–Vendredi
    # Pour 7 jours/7, remplacer par :
    # - cron: '0 5 * * *'

  # Déclenchement manuel possible depuis GitHub Actions
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Date à générer (YYYY-MM-DD) — laisser vide pour aujourd'"'"'hui'
        required: false
        default: ''

jobs:
  generate-daily-note:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Pour pousser les fichiers générés

    steps:
      # 1. Récupérer le code du repo
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Installer Python et les dépendances
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install yfinance requests

      # 3. Générer le bulletin
      - name: Générer le bulletin quotidien
        run: |
          python generate.py
        env:
          TZ: Europe/Paris

      # 4. Pousser les fichiers générés sur GitHub
      - name: Commit et push
        run: |
          git config user.name "YAASAP Bot"
          git config user.email "bot@yaasap.fr"
          git add notes/ index.html
          git diff --staged --quiet || git commit -m "📊 Bulletin automatique du $(date +'%d %B %Y' --date='today')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
