name: Bulletin quotidien YAASAP Notes

on:
  schedule:
    - cron: '0 5 * * 1-5'   # Lundi–Vendredi 07h00 Paris (CEST)
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Date à générer (YYYY-MM-DD) — laisser vide pour aujourd'"'"'hui'
        required: false
        default: ''

jobs:
  generate-daily-note:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout dailywatch (repo de destination)
        uses: actions/checkout@v4
        with:
          repository: YAASAP/dailywatch
          token: ${{ secrets.GITHUB_TOKEN }}
          path: dailywatch

      - name: Checkout yaasap_generator (script)
        uses: actions/checkout@v4
        with:
          repository: YAASAP/yaasap_generator
          token: ${{ secrets.GITHUB_TOKEN }}
          path: yaasap_generator

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install requests anthropic yfinance

      - name: Générer le bulletin quotidien
        run: |
          python yaasap_generator/generate.py
        env:
          TZ: Europe/Paris
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}/dailywatch

      - name: Commit et push vers dailywatch
        run: |
          cd dailywatch
          git config user.name "YAASAP Bot"
          git config user.email "bot@yaasap.fr"
          git add docs/
          git diff --staged --quiet || git commit -m "📊 Bulletin automatique du $(date +'%d %B %Y')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
