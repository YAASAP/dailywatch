name: YAASAP Notes — Publication quotidienne

on:
  schedule:
    - cron: '30 4 * * 1-5'   # Lun–Ven à 4h30 UTC = 6h30 Paris (heure été)
    - cron: '30 5 * * 6'     # Samedi à 5h30 UTC (optionnel)

  workflow_dispatch:
    inputs:
      force_date:
        description: 'Date forcée (YYYY-MM-DD) — optionnel'
        required: false

jobs:
  generate-note:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic requests

      - name: Generate YAASAP Note
        env:
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd yaasap_generator
          python generate.py

      - name: Commit and push generated note
        run: |
          git config --global user.name  "YAASAP Bot"
          git config --global user.email "bot@yaasap.fr"
          git add -A docs/
          git add -f yaasap_generator/.issue_number 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Aucun changement — skip commit"
          else
            DATE=$(date +'%Y-%m-%d %H:%M')
            git commit -m "📊 Note YAASAP — ${DATE}"
            git push origin main
            echo "✅ Note publiée"
          fi
        - name: Commit and push generated note
        run: |
          git config --global user.name  "YAASAP Bot"
          git config --global user.email "bot@yaasap.fr"
          git add docs/
          git add yaasap_generator/.issue_number
          if git diff --staged --quiet; then
            echo "Aucun changement — skip commit"
          else
            DATE=$(date +'%Y-%m-%d %H:%M')
            git commit -m "📊 Note YAASAP — ${DATE}"
            git push origin main
            echo "✅ Note publiée"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Échec — vérifier les secrets NEWSAPI_KEY et ANTHROPIC_API_KEY"
          exit 1
